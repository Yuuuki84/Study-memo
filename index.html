<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>学習記録ログ</title>
  <style>
    body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0;background:#0b1220;color:#e6eaf2;}
    header{padding:16px 20px;border-bottom:1px solid #22304a;position:sticky;top:0;background:#0b1220;z-index:10;}
    .wrap{display:grid;grid-template-columns:360px 1fr;gap:16px;padding:16px;max-width:1200px;margin:0 auto;}
    .card{background:#111a2e;border:1px solid #22304a;border-radius:12px;padding:14px;}
    input,textarea{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:10px;border:1px solid #2a3a5d;background:#0b1220;color:#e6eaf2;}
    textarea{min-height:88px;resize:vertical;}
    label{display:block;font-size:12px;opacity:.9;margin:10px 0 6px;}
    button{border:0;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:600;}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .primary{background:#4f7cff;color:#081225;}
    .ghost{background:#0b1220;border:1px solid #2a3a5d;color:#e6eaf2;}
    .danger{background:#ff5b5b;color:#200;}
    .mini{padding:6px 10px;font-size:12px;border-radius:8px;}
    .list{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
    .item{padding:10px;border-radius:12px;border:1px solid #22304a;background:#0b1220;cursor:pointer;}
    .item.active{outline:2px solid #4f7cff;}
    .item h4{margin:0 0 6px;font-size:14px;}
    .muted{opacity:.75;font-size:12px;}
    .tag{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid #2a3a5d;font-size:12px;opacity:.9;margin-right:6px;}
    .notes{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
    .note{padding:10px;border-radius:12px;border:1px solid #22304a;background:#0b1220;}
    .note .meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
    /* ✅ 改行を表示で保持（要点・メモ） */
    #detailSummary, .note-text { white-space: pre-wrap; }

    /* ログインオーバーレイ（UIは邪魔しない） */
    #loginOverlay{
      position:fixed; inset:0; display:none;
      background:rgba(0,0,0,.55);
      z-index:9999;
      align-items:center; justify-content:center;
      padding:16px;
    }
    #loginBox{
      width:min(560px, 100%);
      background:#111a2e; border:1px solid #22304a;
      border-radius:12px; padding:16px;
    }
    #loginBox h2{margin:0 0 8px;}
    #loginBox .muted{line-height:1.4;}
    @media (max-width:900px){.wrap{grid-template-columns:1fr;}}
  </style>
</head>

<body>
<!-- ログイン必須表示（未ログイン時に出る） -->
<div id="loginOverlay">
  <div id="loginBox">
    <h2>ログインが必要です</h2>
    <p class="muted">
      このアプリは Google ログイン後に、あなたの UID に紐づいてメモを保存・復元します。<br>
      ※ブラウザのポップアップブロックを解除してください（必要な場合）。
    </p>
    <div class="row" style="margin-top:12px;">
      <button id="googleLoginBtn" class="primary" style="flex:1;">Googleでログイン</button>
      <button id="loginCancelBtn" class="ghost">閉じる</button>
    </div>
    <p class="muted" style="margin-top:10px;">
      「毎回アクセス時にログインを経由」させたい場合は、認証状態の永続性を inMemory にしています（リロードで消えます）。[2](https://firebase.google.com/docs/auth/web/auth-state-persistence)
    </p>
  </div>
</div>

<header>
  <div class="row" style="justify-content:space-between;">
    <div>
      <b>学習記録ログ</b>
      <span class="muted">（Googleログイン必須 / local + Firebase）</span><br>
      <span id="userStatus" class="muted">未ログイン</span>
    </div>
    <div class="row">
      <button id="logoutBtn" class="ghost mini" style="display:none;">ログアウト</button>
      <button id="exportBtn" class="ghost mini">エクスポート</button>
      <button id="importBtn" class="ghost mini">インポート</button>
      <button id="clearBtn" class="danger mini">全削除</button>
    </div>
  </div>
</header>

<div class="wrap" id="appRoot">
  <!-- Left -->
  <div class="card">
    <label>検索</label>
    <input id="searchInput" placeholder="タイトル、URL、タグ、メモから検索" />

    <hr style="border:0;border-top:1px solid #22304a; margin:14px 0;">
    <b>新規記録</b>
    <label>タイトル（必須）</label>
    <input id="titleInput" placeholder="例：Entra Connect 2.5 アップグレード" />
    <label>URL（任意）</label>
    <input id="urlInput" placeholder="https://..." />
    <label>タグ（任意：カンマ/空白区切り）</label>
    <input id="tagsInput" placeholder="例：Entra, AADC, Security" />
    <label>要点（任意）</label>
    <textarea id="summaryInput" placeholder="要点を短くまとめる"></textarea>

    <div class="row" style="margin-top:10px;">
      <button id="addBtn" class="primary" style="flex:1;">追加（編集時は更新）</button>
      <button id="cancelEditBtn" class="ghost">編集解除</button>
    </div>

    <hr style="border:0;border-top:1px solid #22304a; margin:14px 0;">
    <b>一覧</b>
    <div id="itemsList" class="list"></div>
  </div>

  <!-- Right -->
  <div class="card">
    <div class="row" style="justify-content:space-between; align-items:flex-start;">
      <div>
        <h2 id="detailTitle" style="margin:0 0 6px;">（未選択）</h2>
        <div id="detailTags" style="margin-top:8px;"></div>
      </div>
      <button id="deleteItemBtn" class="danger mini" disabled>この記録を削除</button>
    </div>

    <hr style="border:0;border-top:1px solid #22304a; margin:14px 0;">

    <b>要点</b>
    <div id="detailSummary" class="muted" style="margin-top:8px;"></div>

    <hr style="border:0;border-top:1px solid #22304a; margin:14px 0;">

    <b>追記メモ</b>
    <label>メモを追記</label>
    <textarea id="noteInput" placeholder="調べた内容の補足、やること、注意点など"></textarea>
    <div class="row" style="margin-top:10px;">
      <button id="addNoteBtn" class="primary" style="flex:1;" disabled>追記する</button>
    </div>

    <div id="notesList" class="notes"></div>
  </div>
</div>

<script>
/* =========================
   Learning Log (local-first)
   ========================= */
const STORAGE_KEY = "learning_log_v1";
const $ = (id) => document.getElementById(id);

let state = { items: [], selectedId: null, query: "" };
let editingId = null;

const now = () => Date.now();
function uid() {
  return (crypto?.randomUUID) ? crypto.randomUUID() : `id_${now()}_${Math.random().toString(16).slice(2)}`;
}
function normalizeTags(str) {
  if (!str) return [];
  return str.split(/[,、\s]+/).map(t => t.trim()).filter(Boolean).slice(0, 20);
}
function escapeHtml(s) {
  return String(s)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return [];
  try { const data = JSON.parse(raw); return Array.isArray(data) ? data : []; }
  catch { return []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items));
  // Firebase は裏で（ログイン後に window.saveToCloud がセットされる）
  window.saveToCloud?.(state.items).catch(()=>{});
}

function findItem(id) { return state.items.find(x => x.id === id) ?? null; }

function loadItemToForm(item){
  if(!item) return;
  $("titleInput").value = item.title || "";
  $("urlInput").value = item.url || "";
  $("tagsInput").value = (item.tags||[]).join(", ");
  $("summaryInput").value = item.summary || "";
  editingId = item.id;
}

function clearForm(){
  $("titleInput").value = "";
  $("urlInput").value = "";
  $("tagsInput").value = "";
  $("summaryInput").value = "";
  editingId = null;
}

function upsertFromForm(){
  const title = $("titleInput").value;
  if(!title.trim()){ alert("タイトルは必須です。"); return; }

  const payload = {
    title: title.trim(),
    url: ($("urlInput").value||"").trim(),
    tags: normalizeTags($("tagsInput").value||""),
    summary: ($("summaryInput").value||"").replace(/\r\n/g,"\n")
  };

  if(editingId){
    const item = findItem(editingId);
    if(item){
      Object.assign(item, payload);
      item.updatedAt = now();
    }
    editingId = null;
  }else{
    const item = { id: uid(), notes: [], createdAt: now(), updatedAt: now(), ...payload };
    state.items.unshift(item);
    state.selectedId = item.id;
  }
  save(); render();
  clearForm();
}

function deleteSelected(){
  const id = state.selectedId;
  if(!id) return;
  if(!confirm("この記録を削除します。よろしいですか？")) return;
  state.items = state.items.filter(x=>x.id!==id);
  state.selectedId = state.items[0]?.id ?? null;
  save(); render();
}

function addNoteToSelected(){
  const item = findItem(state.selectedId);
  if(!item) return;
  const text = ($("noteInput").value||"").replace(/\r\n/g,"\n").trim();
  if(!text) return;
  item.notes.unshift({ id: uid(), text, at: now() });
  item.updatedAt = now();
  $("noteInput").value = "";
  save(); render();
}

function filteredItems() {
  const q = (state.query||"").trim().toLowerCase();
  if (!q) return state.items;
  return state.items.filter(item => {
    const hay = [
      item.title,item.url,item.summary,(item.tags||[]).join(" "),
      (item.notes||[]).map(n=>n.text).join(" ")
    ].join(" ").toLowerCase();
    return hay.includes(q);
  });
}

function renderList(){
  const list = $("itemsList");
  const items = filteredItems();
  list.innerHTML = items.map(item => `
    <div class="item ${item.id===state.selectedId?"active":""}" data-id="${item.id}">
      <h4>${escapeHtml(item.title)}</h4>
      <div class="muted">更新: ${new Date(item.updatedAt).toLocaleString()}</div>
    </div>
  `).join("");
}

function renderDetail(){
  const item = findItem(state.selectedId);
  if(!item){
    $("detailTitle").textContent="（未選択）";
    $("detailTags").innerHTML="";
    $("detailSummary").textContent="";
    $("notesList").innerHTML="";
    $("addNoteBtn").disabled=true;
    $("deleteItemBtn").disabled=true;
    return;
  }
  $("detailTitle").textContent=item.title||"";
  $("detailTags").innerHTML=(item.tags||[]).map(t=>`<span class="tag">#${escapeHtml(t)}</span>`).join("");
  $("detailSummary").textContent=item.summary||"";
  $("deleteItemBtn").disabled=false;
  $("addNoteBtn").disabled=false;

  $("notesList").innerHTML=(item.notes||[]).map(n=>`
    <div class="note">
      <div class="note-text">${escapeHtml(n.text)}</div>
      <div class="meta"><span class="muted">${new Date(n.at).toLocaleString()}</span></div>
    </div>
  `).join("");
}

function render(){
  renderList();
  renderDetail();
}

/* export/import */
function exportJson() {
  const data = JSON.stringify(state.items, null, 2);
  const blob = new Blob([data], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `learning-log-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importJson(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error("invalid");
      state.items = data;
      state.selectedId = state.items[0]?.id ?? null;
      save(); render();
      alert("インポートしました。");
    } catch {
      alert("インポートに失敗しました（JSON形式を確認してください）。");
    }
  };
  reader.readAsText(file);
}

/* init */
document.addEventListener("DOMContentLoaded",()=>{
  state.items = load();
  state.selectedId = state.items[0]?.id ?? null;
  render();

  $("addBtn").addEventListener("click", upsertFromForm);
  $("cancelEditBtn").addEventListener("click", () => { clearForm(); });

  $("itemsList").addEventListener("click", (e)=>{
    const row = e.target.closest(".item");
    if(!row) return;
    state.selectedId = row.dataset.id;
    loadItemToForm(findItem(state.selectedId)); // 編集用にフォーム反映
    render();
  });

  $("deleteItemBtn").addEventListener("click", deleteSelected);
  $("addNoteBtn").addEventListener("click", addNoteToSelected);

  $("searchInput").addEventListener("input",(e)=>{
    state.query = e.target.value ?? "";
    renderList();
  });

  $("exportBtn").addEventListener("click", exportJson);

  $("importBtn").addEventListener("click", ()=>{
    const input = document.createElement("input");
    input.type="file";
    input.accept="application/json";
    input.onchange=()=>{ const f=input.files?.[0]; if(f) importJson(f); };
    input.click();
  });

  $("clearBtn").addEventListener("click", ()=>{
    if(!confirm("すべて削除します。よろしいですか？")) return;
    state.items=[]; state.selectedId=null; editingId=null;
    save(); render();
  });
});
</script>

<!-- ================= Firebase: Google Login + Firestore Sync ================= -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, signInWithPopup, signOut,
    GoogleAuthProvider, setPersistence,
    inMemoryPersistence, browserSessionPersistence
  } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  // Firebase config（あなたの値）
  const firebaseConfig = {
    apiKey: "AIzaSyC-rZ8Hrh67Wzo62g6Afu_CVUbC7yWLrqE",
    authDomain: "project-memo-5465f.firebaseapp.com",
    projectId: "project-memo-5465f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 🔐 認証永続性：毎回アクセス時にログイン経由にしたいなら inMemory（リロードで消える）[2](https://firebase.google.com/docs/auth/web/auth-state-persistence)
  // もし「タブを閉じるまで維持」でよければ browserSessionPersistence に切り替え可能 [2](https://firebase.google.com/docs/auth/web/auth-state-persistence)
  await setPersistence(auth, inMemoryPersistence);

  const provider = new GoogleAuthProvider();
  // Googleログイン時にアカウント選択を促す（同一ブラウザで複数アカウントがある場合に便利）
  provider.setCustomParameters({ prompt: "select_account" }); // Googleサインインのフローは公式で popup/redirect をサポート [1](https://firebase.google.com/docs/auth/web/google-signin)

  const loginOverlay = document.getElementById("loginOverlay");
  const loginBtn = document.getElementById("googleLoginBtn");
  const cancelBtn = document.getElementById("loginCancelBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const userStatus = document.getElementById("userStatus");

  async function doLogin(){
    // 公式：Google provider + signInWithPopup でログイン [1](https://firebase.google.com/docs/auth/web/google-signin)
    await signInWithPopup(auth, provider);
  }

  loginBtn.addEventListener("click", async ()=>{
    try{ await doLogin(); }
    catch(e){
      alert("ログインに失敗しました。ポップアップがブロックされていないか確認してください。");
      console.error(e);
    }
  });
  cancelBtn.addEventListener("click", ()=>{ loginOverlay.style.display="none"; });
  logoutBtn.addEventListener("click", async ()=>{
    await signOut(auth);
  });

  onAuthStateChanged(auth, async (user) => {
    if(!user){
      // 未ログイン → ログイン画面を表示
      userStatus.textContent = "未ログイン（Googleログインが必要）";
      logoutBtn.style.display = "none";
      loginOverlay.style.display = "flex";
      window.saveToCloud = undefined;
      return;
    }

    // ログイン済み
    userStatus.textContent = `ログイン中: ${user.email ?? user.uid}`;
    logoutBtn.style.display = "inline-block";
    loginOverlay.style.display = "none";

    // Firestore: ユーザー UID ごとに保存
    const ref = doc(db, "learnLogs", user.uid);

    // 🔄 クラウド → ローカル復元（local が空のときだけ）
    try{
      const snap = await getDoc(ref);
      if(snap.exists()){
        const cloudItems = snap.data().items || [];
        const cloudUpdated = snap.data().updatedAt || 0;
        const localRaw = localStorage.getItem("learning_log_v1");
        const localItems = localRaw ? JSON.parse(localRaw) : [];

        // ローカルが空ならクラウドを採用
        if(!Array.isArray(localItems) || localItems.length===0){
          state.items = cloudItems;
          state.selectedId = state.items[0]?.id ?? null;
          render();
          localStorage.setItem("learning_log_v1", JSON.stringify(state.items));
        } else {
          // ローカルが既にある場合：クラウドが新しければ上書き（最小ルール）
          const localMax = Math.max(...(localItems.map(x=>x.updatedAt||0)), 0);
          if(cloudUpdated > localMax){
            state.items = cloudItems;
            state.selectedId = state.items[0]?.id ?? null;
            render();
            localStorage.setItem("learning_log_v1", JSON.stringify(state.items));
          }
        }
      }
    }catch(e){
      console.error("Cloud load failed:", e);
      // local-first を壊さない
    }

    // 🔼 ローカル → クラウド保存（save() から呼ばれる）
    window.saveToCloud = async (items)=>{
      // ドキュメント更新：items と updatedAt を保存
      await setDoc(ref, { items, updatedAt: Date.now() });
    };
  });
</script>

</body>
</html>
