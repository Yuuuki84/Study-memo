<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>学習記録ログ v3</title>
<style>
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0;background:#0b1220;color:#e6eaf2;}
header{padding:16px 20px;border-bottom:1px solid #22304a;position:sticky;top:0;background:#0b1220;}
.wrap{display:grid;grid-template-columns:360px 1fr;gap:16px;padding:16px;max-width:1200px;margin:0 auto;}
.card{background:#111a2e;border:1px solid #22304a;border-radius:12px;padding:14px;}
input,textarea{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:10px;border:1px solid #2a3a5d;background:#0b1220;color:#e6eaf2;}
textarea{min-height:88px;resize:vertical;}
label{display:block;font-size:12px;opacity:.9;margin:10px 0 6px;}
button{border:0;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:600;}
.row{display:flex;gap:10px;align-items:center;}
.primary{background:#4f7cff;color:#081225;}
.ghost{background:#0b1220;border:1px solid #2a3a5d;color:#e6eaf2;}
.danger{background:#ff5b5b;color:#200;}
.mini{padding:6px 10px;font-size:12px;border-radius:8px;}
.list{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.item{padding:10px;border-radius:12px;border:1px solid #22304a;background:#0b1220;cursor:pointer;}
.item.active{outline:2px solid #4f7cff;}
.item h4{margin:0 0 6px;font-size:14px;}
.muted{opacity:.75;font-size:12px;}
.notes{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.note{padding:10px;border-radius:12px;border:1px solid #22304a;background:#0b1220;}
.note .meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}

/* ✅ 行間（改行）を正しく表示（安全に textContent のまま） */
#detailSummary,
.note .note-text{
  white-space: pre-wrap;
}

@media (max-width:900px){.wrap{grid-template-columns:1fr;}}
</style>
</head>

<body>
<header>
  <div class="row" style="justify-content:space-between;">
    <div><b>学習記録ログ v3</b> <span class="muted">（記録＋追記メモ／local保存）</span></div>
    <div class="row">
      <button id="exportBtn" class="ghost mini">エクスポート</button>
      <button id="importBtn" class="ghost mini">インポート</button>
      <button id="clearBtn" class="danger mini">全削除</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <label>検索</label>
    <input id="searchInput" placeholder="タイトル、URL、タグ、メモから検索" />

    <hr style="border:0;border-top:1px solid #22304a; margin:14px 0;">
    <b>新規記録</b>
    <label>タイトル（必須）</label><input id="titleInput">
    <label>URL（任意）</label><input id="urlInput">
    <label>タグ（任意）</label><input id="tagsInput">
    <label>要点（任意）</label><textarea id="summaryInput"></textarea>
    <button id="addBtn" class="primary" style="margin-top:10px;">追加</button>

    <hr style="border:0;border-top:1px solid #22304a; margin:14px 0;">
    <b>一覧</b>
    <div id="itemsList" class="list"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <h2 id="detailTitle">（未選択）</h2>
      <button id="deleteItemBtn" class="danger mini" disabled>この記録を削除</button>
    </div>
    <hr>
    <div id="detailSummary" class="muted"></div>
    <hr>
    <textarea id="noteInput" placeholder="調べた内容の補足、やること、注意点など"></textarea>
    <button id="addNoteBtn" class="primary" disabled>追記する</button>
    <div id="notesList" class="notes"></div>
  </div>
</div>

<script>
/* ========= Local-first ========= */
const STORAGE_KEY="learning_log_v1";
const $=id=>document.getElementById(id);
let state={items:[],selectedId:null,query:""};
let editingId = null; // ✅ 編集モード（nullなら新規追加）
const now=()=>Date.now();
const uid=()=>crypto.randomUUID();

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state.items));
  if(window.saveToCloud){
    // UXを壊さない：失敗しても握り潰す
    window.saveToCloud(state.items).catch(()=>{});
  }
}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch{return[]}}
function findItem(id){return state.items.find(x=>x.id===id)}

function normalizeTags(str){
  if(!str) return [];
  return str.split(/[,、\s]+/).map(t=>t.trim()).filter(Boolean).slice(0,20);
}

/* ✅ 編集用：選択したアイテムをフォームに戻す */
function loadItemToForm(item){
  if(!item) return;
  $("titleInput").value = item.title || "";
  $("urlInput").value = item.url || "";
  $("tagsInput").value = (item.tags||[]).join(", ");
  $("summaryInput").value = item.summary || "";
  editingId = item.id;
}

/* 新規 or 更新 */
function upsertFromForm(){
  const title = $("titleInput").value;
  const url = $("urlInput").value;
  const tags = $("tagsInput").value;
  const summary = $("summaryInput").value;

  if(!title.trim()){
    alert("タイトルは必須です。");
    return;
  }

  const payload = {
    title: title.trim(),
    url: (url||"").trim(),
    tags: normalizeTags(tags),
    summary: (summary||"").replace(/\r\n/g,"\n") // ✅ 改行正規化
  };

  if(editingId){
    // ✅ 更新
    const item = findItem(editingId);
    if(item){
      Object.assign(item, payload);
      item.updatedAt = now();
    }
    editingId = null;
  }else{
    // ✅ 新規追加
    const item = { id: uid(), notes: [], createdAt: now(), updatedAt: now(), ...payload };
    state.items.unshift(item);
    state.selectedId = item.id;
  }

  // 入力欄クリア
  $("titleInput").value="";
  $("urlInput").value="";
  $("tagsInput").value="";
  $("summaryInput").value="";

  save(); render();
}

/* 追記（メモ） */
function addNoteToSelected(){
  const cur = findItem(state.selectedId);
  if(!cur) return;
  const text = ($("noteInput").value||"").replace(/\r\n/g,"\n").trim(); // ✅ 改行正規化
  if(!text) return;

  cur.notes.unshift({ id: uid(), text, at: now() });
  cur.updatedAt = now();
  $("noteInput").value="";
  save(); render();
}

/* 削除 */
function deleteSelected(){
  if(!state.selectedId) return;
  if(!confirm("この記録を削除します。よろしいですか？")) return;
  state.items = state.items.filter(x=>x.id!==state.selectedId);
  state.selectedId = state.items[0]?.id ?? null;
  editingId = null;
  save(); render();
}

/* 一覧レンダー（検索対応） */
function renderList(){
  const q = (state.query||"").trim().toLowerCase();
  const items = !q ? state.items : state.items.filter(item=>{
    const hay = [
      item.title,
      item.url,
      item.summary,
      (item.tags||[]).join(" "),
      (item.notes||[]).map(n=>n.text).join(" ")
    ].join(" ").toLowerCase();
    return hay.includes(q);
  });

  $("itemsList").innerHTML = items.map(i=>`
    <div class="item ${i.id===state.selectedId?"active":""}" data-id="${i.id}">
      <h4>${escapeHtml(i.title)}</h4>
      <div class="muted">更新: ${new Date(i.updatedAt).toLocaleString()}</div>
    </div>
  `).join("");
}

/* 詳細レンダー */
function renderDetail(){
  const cur = findItem(state.selectedId);
  if(!cur){
    $("detailTitle").textContent="（未選択）";
    $("detailSummary").textContent="";
    $("notesList").innerHTML="";
    $("addNoteBtn").disabled=true;
    $("deleteItemBtn").disabled=true;
    return;
  }

  $("detailTitle").textContent=cur.title;
  // ✅ 改行保持：textContent + CSS pre-wrap
  $("detailSummary").textContent=cur.summary||"";

  $("addNoteBtn").disabled=false;
  $("deleteItemBtn").disabled=false;

  $("notesList").innerHTML = (cur.notes||[]).map(n=>`
    <div class="note">
      <div class="note-text">${escapeHtml(n.text)}</div>
      <div class="meta">
        <span class="muted">${new Date(n.at).toLocaleString()}</span>
      </div>
    </div>
  `).join("");
}

function render(){
  renderList();
  renderDetail();
}

/* 安全なエスケープ（innerHTMLで出す箇所のため） */
function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

/* ===== エクスポート/インポート ===== */
function exportJson(){
  const blob=new Blob([JSON.stringify(state.items,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`learning-log-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function importJson(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!Array.isArray(d)) throw 0;
      state.items=d;
      state.selectedId=d[0]?.id??null;
      editingId=null;
      save();render();
      alert("インポートしました。");
    }catch{
      alert("インポートに失敗しました。");
    }
  };
  r.readAsText(file);
}

document.addEventListener("DOMContentLoaded",()=>{
  state.items=load();
  state.selectedId=state.items[0]?.id??null;
  render();

  // ✅ 追加/更新（編集対応）
  $("addBtn").onclick = upsertFromForm;

  // ✅ 一覧クリック → 詳細表示 + 編集フォームに反映
  $("itemsList").onclick = (e)=>{
    const row=e.target.closest(".item");
    if(!row) return;
    state.selectedId=row.dataset.id;
    const item=findItem(state.selectedId);
    loadItemToForm(item); // ✅ 編集機能
    render();
  };

  // ✅ 追記
  $("addNoteBtn").onclick = addNoteToSelected;

  // ✅ 削除
  $("deleteItemBtn").onclick = deleteSelected;

  // ✅ 検索
  $("searchInput").oninput = (e)=>{ state.query=e.target.value; renderList(); };

  // ✅ エクスポート
  $("exportBtn").onclick = exportJson;

  // ✅ インポート
  $("importBtn").onclick = ()=>{
    const i=document.createElement("input");
    i.type="file"; i.accept="application/json";
    i.onchange=()=>i.files[0]&&importJson(i.files[0]);
    i.click();
  };

  // ✅ 全削除
  $("clearBtn").onclick = ()=>{
    if(confirm("すべて削除しますか？")){
      state.items=[]; state.selectedId=null; editingId=null;
      save(); render();
    }
  };
});
</script>

<!-- ===== Firebase（裏） ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyC-rZ8Hrh67Wzo62g6Afu_CVUbC7yWLrqE",
  authDomain:"project-memo-5465f.firebaseapp.com",
  projectId:"project-memo-5465f"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

// ✅ 匿名認証（ログインUIなし）[3](https://microsoft.sharepoint.com/teams/Azure2/_layouts/15/Doc.aspx?action=edit&mobileredirect=true&wdorigin=Sharepoint&DefaultItemOpen=1&sourcedoc={5ddbe20b-16ea-4768-ae79-112e7e8d362d}&wd=target(/AzureAD/Account and Sync/Sync/1. Sync - Connect General.one/)&wdpartid={d8729a1f-12dd-0ea5-0581-0f37b2bf6116}{1}&wdsectionfileid={09612ca1-d92d-493a-bd84-b501754c881f})
await signInAnonymously(auth);

auth.onAuthStateChanged(async user=>{
  if(!user) return;

  const ref=doc(db,"learnLogs",user.uid);

  // 🔹 初回起動（localが空ならクラウドから復元）
  try{
    const snap = await getDoc(ref);
    if(snap.exists() && (!Array.isArray(state.items) || state.items.length===0)){
      state.items = snap.data().items || [];
      state.selectedId = state.items[0]?.id ?? null;
      render();
    }
  }catch(e){
    // 失敗しても local-first を壊さない
  }

  // 🔹 裏保存：local保存後に呼ばれる
  window.saveToCloud = async (items)=>{
    await setDoc(ref,{items,updatedAt:Date.now()});
  };
});
</script>
</body>
</html>
